name: Build & Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Install ossutil
        run: |
          curl -L -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.21/ossutil-v1.7.21-linux-amd64.zip
          unzip ossutil -d /tmp/ossutil
          sudo cp /tmp/ossutil/ossutil-v1.7.21-linux-amd64/ossutil64 /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil
          ossutil --version

      - name: Configure ossutil
        run: |
          ossutil config \
            -e oss-cn-shanghai.aliyuncs.com \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          ossutil cp -r -f dist/ oss://${{ secrets.OSS_BUCKET }}/ --update
          echo "Deployed to https://${{ secrets.OSS_BUCKET }}.oss-cn-shanghai.aliyuncs.com"
