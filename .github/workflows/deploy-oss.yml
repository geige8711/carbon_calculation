name: Build & Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Install aliyun CLI
        run: |
          curl -Lo aliyun-cli.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun version

      - name: Configure aliyun CLI
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --region cn-shanghai

      - name: Upload to OSS
        run: |
          aliyun oss sync dist/ oss://${{ secrets.OSS_BUCKET }}/ --force
          echo "Deployed to https://${{ secrets.OSS_BUCKET }}.oss-cn-shanghai.aliyuncs.com"
